[manifest]
version = "1.0.0"
dump_lua = true
priority = 0

# Insert Fusions button after Jokers in Collection UI
[[patches]]
[patches.pattern]
target = "functions/UI_definitions.lua"
pattern = "UIBox_button({button = 'your_collection_jokers', label = {localize('b_jokers')}, count = G.DISCOVER_TALLIES.jokers,  minw = 5, minh = 1.7, scale = 0.6, id = 'your_collection_jokers'}),"
position = "after"
payload = "      UIBox_button({button = 'your_collection_fusions', label = {localize('b_fusions') or 'Fusions'}, count = G.DISCOVER_TALLIES.fusions, minw = 5, minh = 1.7, scale = 0.6, id = 'your_collection_fusions'}),"
match_indent = true
